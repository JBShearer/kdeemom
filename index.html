<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kdeemom — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --coral: #FF6B6B;
    --sunny: #FFD93D;
    --mint: #6BCB77;
    --sky: #4D96FF;
    --grape: #9B5DE5;
    --pink: #F15BB5;
    --cream: #FFF8F0;
    --dark: #2D2B3D;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Quicksand', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* floating shapes */
  .shape {
    position: absolute;
    border-radius: 50%;
    opacity: 0.15;
    animation: drift 20s infinite ease-in-out;
    z-index: 0;
  }
  .shape:nth-child(1) {
    width: 300px; height: 300px;
    background: var(--coral);
    top: -80px; left: -60px;
    animation-delay: 0s;
  }
  .shape:nth-child(2) {
    width: 200px; height: 200px;
    background: var(--sky);
    top: 60%; right: -40px;
    animation-delay: -5s;
    animation-duration: 25s;
  }
  .shape:nth-child(3) {
    width: 250px; height: 250px;
    background: var(--sunny);
    bottom: -60px; left: 30%;
    animation-delay: -10s;
    animation-duration: 22s;
  }
  .shape:nth-child(4) {
    width: 180px; height: 180px;
    background: var(--grape);
    top: 10%; right: 20%;
    animation-delay: -3s;
    animation-duration: 28s;
  }
  .shape:nth-child(5) {
    width: 150px; height: 150px;
    background: var(--mint);
    bottom: 20%; left: 10%;
    animation-delay: -8s;
    animation-duration: 18s;
  }
  .shape:nth-child(6) {
    width: 120px; height: 120px;
    background: var(--pink);
    top: 40%; left: 50%;
    animation-delay: -13s;
    animation-duration: 24s;
  }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    25% { transform: translate(40px, -30px) scale(1.1) rotate(5deg); }
    50% { transform: translate(-20px, 40px) scale(0.95) rotate(-3deg); }
    75% { transform: translate(30px, 20px) scale(1.05) rotate(4deg); }
  }

  .container {
    text-align: center;
    z-index: 1;
    padding: 2rem;
    max-width: 600px;
  }

  .logo {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(3rem, 10vw, 5.5rem);
    letter-spacing: -2px;
    margin-bottom: 0.2em;
    animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .logo .k { color: var(--coral); }
  .logo .d { color: var(--sunny); }
  .logo .e1 { color: var(--mint); }
  .logo .e2 { color: var(--sky); }
  .logo .m { color: var(--grape); }
  .logo .o { color: var(--pink); }
  .logo .m2 { color: var(--coral); }
  .logo .dot { color: var(--dark); }

  @keyframes popIn {
    0% { transform: scale(0.3) rotate(-8deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .tagline {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    color: var(--dark);
    margin-bottom: 2rem;
    animation: slideUp 0.6s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes slideUp {
    0% { transform: translateY(30px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  .fun-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 2.5rem;
    animation: slideUp 0.6s 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .fun-bar span {
    display: block;
    width: 40px;
    height: 8px;
    border-radius: 4px;
    animation: barBounce 2s infinite ease-in-out;
  }
  .fun-bar span:nth-child(1) { background: var(--coral); animation-delay: 0s; }
  .fun-bar span:nth-child(2) { background: var(--sunny); animation-delay: 0.15s; }
  .fun-bar span:nth-child(3) { background: var(--mint); animation-delay: 0.3s; }
  .fun-bar span:nth-child(4) { background: var(--sky); animation-delay: 0.45s; }
  .fun-bar span:nth-child(5) { background: var(--grape); animation-delay: 0.6s; }
  .fun-bar span:nth-child(6) { background: var(--pink); animation-delay: 0.75s; }

  @keyframes barBounce {
    0%, 100% { transform: scaleX(1); }
    50% { transform: scaleX(1.8); }
  }

  .message {
    font-size: clamp(1rem, 3vw, 1.15rem);
    color: var(--dark);
    opacity: 0.7;
    line-height: 1.7;
    margin-bottom: 2.5rem;
    animation: slideUp 0.6s 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .emoji-row {
    font-size: 2rem;
    letter-spacing: 0.3em;
    animation: slideUp 0.6s 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    user-select: none;
  }
  .emoji-row span {
    display: inline-block;
    animation: wiggle 3s infinite ease-in-out;
    cursor: default;
    transition: transform 0.2s;
  }
  .emoji-row span:hover {
    transform: scale(1.4) rotate(10deg);
  }
  .emoji-row span:nth-child(1) { animation-delay: 0s; }
  .emoji-row span:nth-child(2) { animation-delay: 0.4s; }
  .emoji-row span:nth-child(3) { animation-delay: 0.8s; }
  .emoji-row span:nth-child(4) { animation-delay: 1.2s; }
  .emoji-row span:nth-child(5) { animation-delay: 1.6s; }

  @keyframes wiggle {
    0%, 100% { transform: rotate(0deg) translateY(0); }
    25% { transform: rotate(-6deg) translateY(-4px); }
    75% { transform: rotate(6deg) translateY(-4px); }
  }

  /* confetti burst on click */
  .confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 100;
    animation: confettiFall 1.5s forwards ease-out;
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(400px) rotate(720deg) scale(0); opacity: 0; }
  }
</style>
</head>
<body>

<div class="shape"></div>
<div class="shape"></div>
<div class="shape"></div>
<div class="shape"></div>
<div class="shape"></div>
<div class="shape"></div>

<div class="container">
  <div class="logo">
    <span class="k">K</span><span class="d">d</span><span class="e1">e</span><span class="e2">e</span><span class="m">m</span><span class="o">o</span><span class="m2">m</span>
  </div>

  <div class="tagline">Something fun is on the way!</div>

  <div class="fun-bar">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="message">
    We're putting the finishing touches on something special.<br>
    Check back soon!
  </div>

  <div class="emoji-row">
    <span>🎨</span>
    <span>✨</span>
    <span>🚀</span>
    <span>🎉</span>
    <span>💜</span>
  </div>
</div>

<script>
  // confetti burst on click anywhere
  document.addEventListener('click', (e) => {
    const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#9B5DE5','#F15BB5'];
    for (let i = 0; i < 15; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = e.clientX + 'px';
      c.style.top = e.clientY + 'px';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.transform = `translate(${(Math.random()-0.5)*200}px, 0)`;
      c.style.animation = `confettiFall ${1+Math.random()}s forwards ease-out`;
      c.style.width = (6+Math.random()*8)+'px';
      c.style.height = (6+Math.random()*8)+'px';
      c.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2000);
    }
  });
</script>

</body>
</html>
